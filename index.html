<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>システム対戦しりとり</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app-shell">
<header class="app-header">
  <div>
    <h1>システム対戦しりとり</h1>
    <p id="requiredHeadLabel" class="required-head">次の文字：-</p>
  </div>

  <div class="header-actions">
    <a class="header-link" href="simulation.html">AI戦闘シミュへ</a>

    <button id="settingsButton" class="settings-button" type="button">
      ⚙
    </button>
  </div>
</header>

    <aside id="settingsPanel" class="settings-panel" hidden>
      <h2>設定</h2>

      <label class="setting-row">
        <span>濁音・半濁音</span>
        <select id="dakutenModeSelect">
          <option value="strict">厳密モード</option>
          <option value="loose">ゆるめモード</option>
        </select>
      </label>

      <p class="setting-note">
        ※ゲーム中に変更した場合、次のリトライから反映されます。
      </p>

      <label class="setting-row checkbox-row">
        <input id="debugModeCheckbox" type="checkbox" />
        <span>デバッグモード</span>
      </label>
    </aside>

    <main class="main-area">
      <section id="chatLog" class="chat-log" aria-label="チャット履歴"></section>

      <section id="debugPanel" class="debug-panel" hidden>
        <h2>デバッグ表示</h2>
        <div id="debugWarnings" class="debug-warnings"></div>
        <div id="debugInfo" class="debug-info"></div>
      </section>

      <form id="inputForm" class="input-area">
        <input
          id="wordInput"
          type="text"
          autocomplete="off"
          placeholder="単語を入力"
        />
        <button id="sendButton" type="submit">送信</button>
        <button id="surrenderButton" type="button">降参</button>
      </form>
    </main>
  </div>

  <div id="resultModal" class="modal-backdrop" hidden>
    <div class="modal-card">
      <h2 id="resultTitle">勝敗</h2>
      <p id="resultMessage"></p>
      <button id="retryButton" type="button">リトライ</button>
    </div>
  </div>


    <div id="strategyModal" class="modal-backdrop">
    <div class="modal-card strategy-modal-card">
      <h2>対戦する戦略を選択</h2>
      <p>このゲームで対戦するシステム戦略を選んでください。</p>

      <div id="strategyList" class="strategy-list"></div>

      <button id="startWithStrategyButton" type="button" disabled>
        この戦略で開始
      </button>
    </div>
  </div>


  <script src="js/app.js"></script>
  <script src="js/wordlist.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/rules.js"></script>
 
  <script src="js/strategy/random.js"></script>
  <script src="js/strategy/random_v2.js"></script>
  <script src="js/strategy/minimize_opponent.js"></script>
  <script src="js/strategy/safe_minimize_opponent.js"></script>
  <script src="js/strategy/worst_case_survival.js"></script>
  <script src="js/strategy/sniper.js"></script>
  <script src="js/strategy/target_head_attack.js"></script>
  <script src="js/strategy/adaptive_head_attack.js"></script>


  <script src="js/ui.js"></script>
  <script src="js/debug.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
